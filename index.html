<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProGym - Professional Fitness App</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== SPLASH SCREEN ===== -->
    <div id="splashScreen">
        <div class="splash-logo-container">
            <img src="https://via.placeholder.com/100x100/6C63FF/FFFFFF?text=💪" alt="ProGym Logo">
        </div>
        <div style="font-size:28px;font-weight:700;color:white;margin-bottom:4px;">ProGym</div>
        <div style="color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:20px;">Professional Fitness App</div>
        <div class="splash-loader"></div>
        <div class="splash-version">v3.0.1</div>
        <div class="splash-progress">
            <div class="splash-progress-bar"></div>
        </div>
    </div>

    <!-- ===== TOAST CONTAINER ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <div class="modal-handle"></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ===== APP CONTAINER ===== -->
    <div id="app">
        <!-- Pages will be loaded here -->
        <div id="pageContainer"></div>
    </div>

    <!-- ===== WORKOUT PLAYER OVERLAY ===== -->
    <div id="playerOverlay">
        <div class="player-header">
            <button onclick="closePlayer()"><i class="fas fa-chevron-left"></i></button>
            <h3>Upper Body Power</h3>
            <button onclick="closePlayer()"><i class="fas fa-times"></i></button>
        </div>

        <div class="player-exercise">
            <div class="video-container">
                <div class="placeholder">
                    <i class="fas fa-play-circle" style="font-size:60px;color:var(--primary);"></i>
                </div>
            </div>
            <div class="timer">0:45</div>
            <div class="details">
                <h4 id="playerExerciseName">Bench Press</h4>
                <p id="playerExerciseDetail">Set 1 of 4 • 12 reps</p>
            </div>
            <div class="player-progress">
                <div class="bar" style="width:25%;"></div>
            </div>
        </div>

        <div class="player-controls">
            <button class="ctrl-btn" onclick="previousExercise()"><i class="fas fa-step-backward"></i></button>
            <button class="play-btn" onclick="togglePlayerPlay()"><i class="fas fa-pause" id="playerPlayIcon"></i></button>
            <button class="ctrl-btn" onclick="nextExercise()"><i class="fas fa-step-forward"></i></button>
        </div>

        <div style="display:flex;justify-content:center;gap:16px;margin-top:8px;">
            <button class="btn-outline" style="padding:8px 20px;font-size:12px;width:auto;max-width:none;border-color:var(--success);color:var(--success);" onclick="completeWorkout()">
                <i class="fas fa-check"></i> Finish
            </button>
            <button class="btn-outline" style="padding:8px 20px;font-size:12px;width:auto;max-width:none;" onclick="showToast('Rest timer started', 'info')">
                <i class="fas fa-clock"></i> Rest
            </button>
        </div>
    </div>

    <!-- ===== BOTTOM NAVIGATION ===== -->
    <div id="bottomNav">
        <button class="nav-item active" data-page="home" onclick="loadPage('home')">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </button>
        <button class="nav-item" data-page="workouts" onclick="loadPage('workouts')">
            <i class="fas fa-dumbbell"></i>
            <span>Workouts</span>
        </button>
        <button class="nav-center" onclick="startWorkout()">
            <i class="fas fa-play"></i>
        </button>
        <button class="nav-item" data-page="schedule" onclick="loadPage('schedule')">
            <i class="fas fa-calendar-alt"></i>
            <span>Schedule</span>
        </button>
        <button class="nav-item" data-page="profile" onclick="loadPage('profile')">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </button>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="app.js"></script>
</body>
                                                                      </html>
